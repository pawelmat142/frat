version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: jobhigh_db_prod
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "${DATABASE_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - jobhigh_network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    container_name: jobhigh_backend_prod
    env_file:
      - .env
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      NODE_ENV: production
      PORT: 3100
    ports:
      - "${BACKEND_PORT}:3100"
    depends_on:
      - db
    networks:
      - jobhigh_network
    restart: unless-stopped
    volumes:
      - ./backend:/app/backend
      - ./shared:/app/shared
      - /app/backend/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: jobhigh_frontend_prod
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL}
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - jobhigh_network
    restart: unless-stopped

volumes:
  postgres_data:


networks:
  jobhigh_network:
    driver: bridge
