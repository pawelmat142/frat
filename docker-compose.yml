services:
  db:
    image: postgres:15-alpine
    container_name: jobhigh_db
    environment:
      POSTGRES_DB: jobhigh_db
      POSTGRES_USER: jobhigh_user
      POSTGRES_PASSWORD: jobhigh_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - jobhigh_network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: jobhigh_backend
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: jobhigh_db
      DATABASE_USER: jobhigh_user
      DATABASE_PASSWORD: jobhigh_pass
      NODE_ENV: development
      PORT: 3100
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3100:3100"
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - jobhigh_network
    command: npm run start:nodemon

  frontend:
    build: ./frontend
    container_name: jobhigh_frontend
    environment:
      REACT_APP_API_URL: http://localhost:3100/api
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - jobhigh_network
    command: npm start

volumes:
  postgres_data:

networks:
  jobhigh_network:
    driver: bridge
