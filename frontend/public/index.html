<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
  <meta name="theme-color" content="#111214">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FRAT">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Signika:wght@300..700&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
    rel="stylesheet">
  <title>FRAT</title>
  <style>
    #splash {
      position: fixed;
      inset: 0;
      background: #111214;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 9999;
    }
    #splash img {
      width: 120px;
      height: 120px;
    }
    #splash span {
      color: #ffffff;
      font-family: 'Signika', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.15em;
      opacity: 0.6;
    }
  </style>
</head>

<body class="primary-bg">
  <div id="splash">
    <img src="/assets/icons/icon-192.png" alt="FRAT" />
    <span>FRAT</span>
  </div>
  <div id="root"></div>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var root = document.getElementById('root');
      var splash = document.getElementById('splash');
      var observer = new MutationObserver(function () {
        if (root.children.length > 0) {
          splash.style.display = 'none';
          observer.disconnect();
        }
      });
      observer.observe(root, { childList: true });
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</body>

</html>
